name: Dev Environment Manual Control

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - startup
          - shutdown
        default: 'startup'
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - frontend-dev.yaml
          - samuel.yaml
          - tim-base.yaml
          - tim-combined.yaml
          - tine-dashboarding.yaml
          - disq-mcp-test.yaml
          - hierarchies-test.yaml
          - disqover-staging.yaml

jobs:
  manage-environment:
    uses: ./.github/workflows/dev-env-auto-shutdown.yml
    with:
      action: ${{ inputs.action }}
      target: ${{ inputs.environment }}
    secrets: inherit
